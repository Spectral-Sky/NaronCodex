<!--
    NARON CODEX — CHEST INTEGRATION SNIPPET
    =========================================
    Copy the <style> block into your page's <style> section.
    Copy the chest elements wherever you want to hide them on the page.
    Copy the <script> block into your page's <script> section.
-->

<!-- ═══════════════════════════════════════════════════
     STYLES — paste inside your existing <style> block
     ═══════════════════════════════════════════════════ -->
<style>
/* ── Hidden chest triggers ── */
.loot-chest {
    display: inline-block;
    width: 18px; height: 18px;
    cursor: pointer;
    opacity: 0.08;
    transition: opacity 0.4s, transform 0.3s;
    user-select: none;
    font-size: 16px;
    line-height: 18px;
    filter: grayscale(1);
}
.loot-chest:hover {
    opacity: 0.55;
    transform: scale(1.3);
    filter: grayscale(0);
}

/* ── Chest reveal modal ── */
#chest-modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 99999;
    align-items: center;
    justify-content: center;
}
#chest-modal-backdrop.active { display: flex; }

#chest-modal {
    background: #050d0a;
    border: 1px solid var(--theme-color, #00ff88);
    box-shadow: 0 0 40px rgba(0,255,136,0.15);
    padding: 30px 35px;
    max-width: 480px;
    width: 90%;
    font-family: 'Courier New', monospace;
    position: relative;
}

#chest-modal-close {
    position: absolute; top: 10px; right: 14px;
    background: none; border: none;
    color: #555; font-size: 1.2em; cursor: pointer;
    font-family: monospace;
}
#chest-modal-close:hover { color: #fff; }

#chest-modal-log {
    color: #00ff88;
    font-size: 0.82em;
    line-height: 1.9;
    min-height: 80px;
    white-space: pre-wrap;
}

#chest-modal-link-wrap {
    display: none;
    margin-top: 18px;
    text-align: center;
}
#chest-modal-link {
    display: inline-block;
    padding: 10px 24px;
    border: 1px solid #ffaa00;
    color: #ffaa00;
    font-family: monospace;
    font-size: 0.9em;
    text-decoration: none;
    letter-spacing: 1px;
    transition: background 0.2s;
}
#chest-modal-link:hover { background: rgba(255,170,0,0.1); }

#chest-modal-empty {
    display: none;
    margin-top: 14px;
    color: #555;
    font-size: 0.8em;
    text-align: center;
    border: 1px dashed #222;
    padding: 10px;
}
</style>

<!-- ═══════════════════════════════════════════════════
     CHEST ELEMENTS — place these anywhere on your page.
     Change data-chest-id to 1, 2, 3, or 4.
     The 📦 emoji is invisible at low opacity — use any
     character or a tiny <img> instead.
     ═══════════════════════════════════════════════════ -->

<!-- Example placements: -->
<span class="loot-chest" data-chest-id="1" title="">📦</span>
<span class="loot-chest" data-chest-id="2" title="">📦</span>
<span class="loot-chest" data-chest-id="3" title="">📦</span>
<span class="loot-chest" data-chest-id="4" title="">📦</span>

<!-- ═══════════════════════════════════════════════════
     MODAL — paste once, anywhere before </body>
     ═══════════════════════════════════════════════════ -->
<div id="chest-modal-backdrop">
    <div id="chest-modal">
        <button id="chest-modal-close" onclick="closeChestModal()">[ X ]</button>
        <div id="chest-modal-log"></div>
        <div id="chest-modal-link-wrap">
            <a id="chest-modal-link" href="#" target="_blank">[ OPEN CACHE ]</a>
        </div>
        <div id="chest-modal-empty"></div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════
     SCRIPT — paste inside your existing <script> block
     ═══════════════════════════════════════════════════ -->
<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CHEST_WORKER_URL = "https://naron-chests.YOUR-SUBDOMAIN.workers.dev";

// ── Chest click handler ──────────────────────────────────────────────────────
document.querySelectorAll(".loot-chest").forEach(el => {
    el.addEventListener("click", () => openChest(el.dataset.chestId));
});

function openChest(id) {
    const backdrop = document.getElementById("chest-modal-backdrop");
    const log      = document.getElementById("chest-modal-log");
    const linkWrap = document.getElementById("chest-modal-link-wrap");
    const linkEl   = document.getElementById("chest-modal-link");
    const emptyEl  = document.getElementById("chest-modal-empty");

    // Reset modal
    log.textContent = "";
    linkWrap.style.display = "none";
    linkEl.href = "#";
    emptyEl.style.display = "none";
    backdrop.classList.add("active");

    // Typewriter-style log lines
    const lines = [
        `> LOOT CACHE #${id} DETECTED`,
        `> AUTHENTICATING...`,
        `> SCANNING CLAIM STATUS...`,
    ];
    let i = 0;
    function printLine() {
        if (i < lines.length) {
            log.textContent += lines[i] + "\n";
            i++;
            setTimeout(printLine, 420);
        } else {
            fetchChest(id, log, linkWrap, linkEl, emptyEl);
        }
    }
    printLine();
}

async function fetchChest(id, log, linkWrap, linkEl, emptyEl) {
    try {
        const res  = await fetch(`${CHEST_WORKER_URL}/chest?id=${id}`);
        const data = await res.json();

        if (data.claimed) {
            log.textContent += `> ${data.message}\n`;
            emptyEl.textContent = "// Better luck on the next drop //";
            emptyEl.style.display = "block";
        } else if (data.url) {
            log.textContent += `> ACCESS GRANTED\n> CACHE UNLOCKED ✓\n`;
            linkEl.href = data.url;
            linkWrap.style.display = "block";
        } else {
            log.textContent += `> ERROR: ${data.error || "Unknown error"}\n`;
        }
    } catch (e) {
        log.textContent += `> CONNECTION FAILED — try again later\n`;
        console.error(e);
    }
}

function closeChestModal() {
    document.getElementById("chest-modal-backdrop").classList.remove("active");
}

// Close on backdrop click
document.getElementById("chest-modal-backdrop").addEventListener("click", function(e) {
    if (e.target === this) closeChestModal();
});
</script>
