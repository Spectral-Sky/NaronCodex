name = "naron-chests"
main = "src/index.js"
compatibility_date = "2024-09-23"

# KV namespace — run `wrangler kv namespace create CHEST_KV` to get the ID, paste it below
[[kv_namespaces]]
binding = "CHEST_KV"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

# Chest URLs are stored as secrets, NOT here.
# After deploying, run:
#   wrangler secret put CHEST_1_URL   (paste the gift link when prompted)
#   wrangler secret put CHEST_2_URL
#   wrangler secret put CHEST_3_URL
#   wrangler secret put CHEST_4_URL
