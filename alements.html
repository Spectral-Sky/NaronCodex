<script>
(function() {
    // ── DATA ──────────────────────────────────────────────────────────────
    // Hexagon positions clockwise from top follow the primary beat-cycle:
    // Fire(0) → Nature(1) → Air(2) → Gem(3) → Metal(4) → Fire  | Neutral(5) = uninvolved
    var ELEMS = [
        { id:'fire',    label:'FIRE',    color:'#e05030', glow:'#ff6040' },
        { id:'nature',  label:'NATURE',  color:'#40a050', glow:'#50c060' },
        { id:'air',     label:'AIR',     color:'#80c0e0', glow:'#a0d8f8' },
        { id:'gem',     label:'GEM',     color:'#c060d0', glow:'#e080f0' },
        { id:'metal',   label:'METAL',   color:'#9898a8', glow:'#b8b8c8' },
        { id:'neutral', label:'NEUTRAL', color:'#c8a830', glow:'#e8c840' },
    ];

    // Primary: 2× — each element completely counters the next in the cycle
    // (attacker does 2×, defender does 0× back)
    var PRIMARY = [[0,1],[1,2],[2,3],[3,4],[4,0]];

    // Secondary: 1.5× — skip-one relationships
    var SECONDARY = [[4,2],[2,0],[0,3],[3,1],[1,4]];

    // Weak: 0.5× — reverse of secondary (same pairs, arrow flipped)
    var WEAK = [[2,4],[0,2],[3,0],[1,3],[4,1]];

    // ── GEOMETRY ──────────────────────────────────────────────────────────
    var W = 880, H = 740, CX = 440, CY = 360, R = 210, ORB = 44;

    ELEMS.forEach(function(e, i) {
        var angle = -Math.PI / 2 + i * (2 * Math.PI / 6);
        e.x = CX + R * Math.cos(angle);
        e.y = CY + R * Math.sin(angle);
    });

    // ── SVG HELPERS ───────────────────────────────────────────────────────
    var svg = document.getElementById('alement-svg');

    function el(tag, attrs) {
        var node = document.createElementNS('http://www.w3.org/2000/svg', tag);
        Object.keys(attrs).forEach(function(k) { node.setAttribute(k, attrs[k]); });
        return node;
    }

    // Arrowhead marker
    function makeMarker(id, color) {
        var m = el('marker', { id:id, markerWidth:'8', markerHeight:'6',
            refX:'7', refY:'3', orient:'auto' });
        var p = el('polygon', { points:'0 0, 8 3, 0 6', fill:color });
        m.appendChild(p);
        return m;
    }

    // Bezier path between two orbs, curving outward (positive offset) or inward
    function arcPath(from, to, offset) {
        var x1 = from.x, y1 = from.y, x2 = to.x, y2 = to.y;
        var dx = x2 - x1, dy = y2 - y1;
        var len = Math.sqrt(dx*dx + dy*dy);
        var ux = dx/len, uy = dy/len;
        // Start/end at orb edges
        var sx = x1 + ux*(ORB+2), sy = y1 + uy*(ORB+2);
        var ex = x2 - ux*(ORB+6), ey = y2 - uy*(ORB+6);
        // Midpoint + perpendicular offset
        var mx = (sx+ex)/2, my = (sy+ey)/2;
        var cpx = mx - uy*offset, cpy = my + ux*offset;
        return 'M'+sx.toFixed(1)+' '+sy.toFixed(1)+
               ' Q'+cpx.toFixed(1)+' '+cpy.toFixed(1)+
               ' '+ex.toFixed(1)+' '+ey.toFixed(1);
    }

    // Outward-biased offset (away from center)
    function outerOffset(from, to, mag) {
        var mx = (from.x + to.x)/2, my = (from.y + to.y)/2;
        var ox = mx - CX, oy = my - CY;
        var oLen = Math.sqrt(ox*ox + oy*oy) || 1;
        // perpendicular component to push away from center
        var dx = to.x-from.x, dy = to.y-from.y;
        var len = Math.sqrt(dx*dx+dy*dy)||1;
        var px = -dy/len, py = dx/len;
        // dot with outward direction to pick sign
        var dot = px*(ox/oLen) + py*(oy/oLen);
        return dot >= 0 ? mag : -mag;
    }

    // ── BUILD SVG ─────────────────────────────────────────────────────────
    var defs = el('defs', {});

    // Glow filters per element
    ELEMS.forEach(function(e) {
        var filt = el('filter', { id:'glow-'+e.id, x:'-50%', y:'-50%', width:'200%', height:'200%' });
        var blur = el('feGaussianBlur', { stdDeviation:'6', result:'blur' });
        var merge = el('feMerge', {});
        var n1 = el('feMergeNode', { in:'blur' });
        var n2 = el('feMergeNode', { in:'SourceGraphic' });
        merge.appendChild(n1); merge.appendChild(n2);
        filt.appendChild(blur); filt.appendChild(merge);
        defs.appendChild(filt);
    });

    // Arrow markers — one per element color for primary, one shared for secondary, one for weak
    ELEMS.forEach(function(e) {
        defs.appendChild(makeMarker('arr-'+e.id, e.color));
        var dim = e.color+'99';
        defs.appendChild(makeMarker('arr-sec-'+e.id, dim));
    });
    defs.appendChild(makeMarker('arr-weak', '#445566'));
    svg.appendChild(defs);

    // Arrow groups (so we can toggle tiers)
    var gPrimary   = el('g', { id:'g-primary',   opacity:'1' });
    var gSecondary = el('g', { id:'g-secondary',  opacity:'1' });
    var gWeak      = el('g', { id:'g-weak',       opacity:'0', 'pointer-events':'none' });
    var gOrbs      = el('g', { id:'g-orbs' });

    // ── PRIMARY ARROWS ────────────────────────────────────────────────────
    PRIMARY.forEach(function(pair) {
        var src = ELEMS[pair[0]], dst = ELEMS[pair[1]];
        var off = outerOffset(src, dst, 52);
        var path = el('path', {
            d: arcPath(src, dst, off),
            stroke: src.color, 'stroke-width':'3.5', fill:'none',
            'marker-end':'url(#arr-'+src.id+')',
            'data-src': pair[0], 'data-dst': pair[1], 'data-tier':'primary',
            class: 'arrow arrow-primary',
            'data-label': src.label+' → '+dst.label+':  ×2  ('+src.label+' deals 2× to '+dst.label+')'
        });
        gPrimary.appendChild(path);
    });

    // ── SECONDARY ARROWS ──────────────────────────────────────────────────
    SECONDARY.forEach(function(pair) {
        var src = ELEMS[pair[0]], dst = ELEMS[pair[1]];
        // inner diagonals — slight offset toward center
        var off = outerOffset(src, dst, -30);
        var path = el('path', {
            d: arcPath(src, dst, off),
            stroke: src.color+'99', 'stroke-width':'2', fill:'none',
            'marker-end':'url(#arr-sec-'+src.id+')',
            'data-src': pair[0], 'data-dst': pair[1], 'data-tier':'secondary',
            class: 'arrow arrow-secondary',
            'data-label': src.label+' → '+dst.label+':  ×1.5'
        });
        gSecondary.appendChild(path);
    });

    // ── WEAK ARROWS ───────────────────────────────────────────────────────
    WEAK.forEach(function(pair) {
        var src = ELEMS[pair[0]], dst = ELEMS[pair[1]];
        var off = outerOffset(src, dst, -30);
        var path = el('path', {
            d: arcPath(src, dst, off),
            stroke: '#445566', 'stroke-width':'1.5', fill:'none',
            'stroke-dasharray':'5 4',
            'marker-end':'url(#arr-weak)',
            'data-src': pair[0], 'data-dst': pair[1], 'data-tier':'weak',
            class: 'arrow arrow-weak',
            'data-label': src.label+' → '+dst.label+':  ×0.5  ('+src.label+' is weak against '+dst.label+')'
        });
        gWeak.appendChild(path);
    });

    svg.appendChild(gPrimary);
    svg.appendChild(gSecondary);
    svg.appendChild(gWeak);

    // ── ORBS ──────────────────────────────────────────────────────────────
    ELEMS.forEach(function(e, i) {
        var g = el('g', { class:'orb-group', 'data-idx':i, style:'cursor:crosshair' });

        // Outer glow ring
        g.appendChild(el('circle', {
            cx: e.x, cy: e.y, r: ORB + 10,
            fill: 'none', stroke: e.color, 'stroke-width':'1',
            opacity:'0.3', filter:'url(#glow-'+e.id+')'
        }));

        // Orb fill
        var grad = el('radialGradient', {
            id: 'rg-'+e.id, cx:'40%', cy:'35%', r:'65%'
        });
        var s1 = el('stop', { offset:'0%' });
        s1.setAttribute('stop-color', e.glow);
        s1.setAttribute('stop-opacity', '0.9');
        var s2 = el('stop', { offset:'100%' });
        s2.setAttribute('stop-color', e.color);
        s2.setAttribute('stop-opacity', '0.5');
        grad.appendChild(s1); grad.appendChild(s2);
        defs.appendChild(grad);

        g.appendChild(el('circle', {
            cx: e.x, cy: e.y, r: ORB,
            fill: 'url(#rg-'+e.id+')',
            stroke: e.color, 'stroke-width':'2',
            filter: 'url(#glow-'+e.id+')'
        }));

        // Label
        var txt = el('text', {
            x: e.x, y: e.y + ORB + 20,
            'text-anchor':'middle', fill: e.color,
            'font-family':"'Courier New',monospace",
            'font-size':'13', 'font-weight':'bold',
            'letter-spacing':'2'
        });
        txt.textContent = e.label;
        g.appendChild(txt);

        // Element symbol inside orb (first letter)
        var sym = el('text', {
            x: e.x, y: e.y + 5,
            'text-anchor':'middle', fill:'#fff',
            'font-family':"'Courier New',monospace",
            'font-size':'18', 'font-weight':'bold', opacity:'0.85'
        });
        sym.textContent = e.label[0];
        g.appendChild(sym);

        gOrbs.appendChild(g);
    });

    svg.appendChild(gOrbs);

    // ── ARROW MULTIPLIER LABELS ───────────────────────────────────────────
    // Placed at bezier midpoints
    function bezierMid(from, to, offset) {
        var x1=from.x, y1=from.y, x2=to.x, y2=to.y;
        var dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
        var ux=dx/len, uy=dy/len;
        var sx=x1+ux*(ORB+2), sy=y1+uy*(ORB+2);
        var ex=x2-ux*(ORB+6), ey=y2-uy*(ORB+6);
        var mx=(sx+ex)/2, my=(sy+ey)/2;
        var cpx=mx-uy*offset, cpy=my+ux*offset;
        // point at t=0.5 on quadratic bezier
        var bx = 0.25*sx + 0.5*cpx + 0.25*ex;
        var by = 0.25*sy + 0.5*cpy + 0.25*ey;
        return { x:bx, y:by };
    }

    var gLabels = el('g', { id:'g-labels' });

    function addLabel(pair, tier, mult, offset) {
        var src = ELEMS[pair[0]], dst = ELEMS[pair[1]];
        var off = outerOffset(src, dst, offset);
        var mid = bezierMid(src, dst, off);
        var color = tier==='weak' ? '#556677' : (tier==='primary' ? src.color : src.color+'bb');
        var bg = el('rect', {
            x: mid.x-16, y: mid.y-9, width:32, height:16, rx:3,
            fill:'rgba(3,6,15,0.82)', stroke: color, 'stroke-width':'0.8',
            class:'lbl-'+tier
        });
        var txt = el('text', {
            x: mid.x, y: mid.y+4, 'text-anchor':'middle',
            fill: color, 'font-family':"'Courier New',monospace",
            'font-size':'10', 'font-weight':'bold',
            class:'lbl-'+tier
        });
        txt.textContent = mult;
        gLabels.appendChild(bg);
        gLabels.appendChild(txt);
    }

    PRIMARY.forEach(function(p)   { addLabel(p, 'primary',   '×2',    52); });
    SECONDARY.forEach(function(p) { addLabel(p, 'secondary', '×1.5', -30); });
    WEAK.forEach(function(p)      { addLabel(p, 'weak',      '×0.5', -30); });

    svg.appendChild(gLabels);

    // ── TIER TOGGLE ───────────────────────────────────────────────────────
    var tierState = { primary:true, secondary:true, weak:false };

    window.toggleTier = function(tier) {
        tierState[tier] = !tierState[tier];
        var on = tierState[tier];
        var g  = document.getElementById('g-'+tier);
        if (g) g.setAttribute('opacity', on ? '1' : '0');
        g && g.setAttribute('pointer-events', on ? 'auto' : 'none');
        // labels
        var lblClass = 'lbl-'+tier;
        document.querySelectorAll('.'+lblClass).forEach(function(n) {
            n.style.display = on ? '' : 'none';
        });
        var btn = document.getElementById('btn-'+tier);
        if (btn) btn.classList.toggle('off', !on);
    };

    // Init weak as hidden
    document.querySelectorAll('.lbl-weak').forEach(function(n) { n.style.display='none'; });

    // ── HOVER — DIM UNRELATED ARROWS ────────────────────────────────────
    var tooltip = document.getElementById('elem-tooltip');

    gOrbs.querySelectorAll('.orb-group').forEach(function(orbG) {
        orbG.addEventListener('mouseenter', function() {
            var idx = parseInt(orbG.getAttribute('data-idx'));
            svg.querySelectorAll('.arrow').forEach(function(a) {
                var s = parseInt(a.getAttribute('data-src'));
                var d = parseInt(a.getAttribute('data-dst'));
                a.style.opacity = (s===idx || d===idx) ? '1' : '0.08';
            });
            svg.querySelectorAll('[class^="lbl-"], [class*=" lbl-"]').forEach(function(n) {
                // keep labels readable only for visible arrows — handled via opacity
            });
        });
        orbG.addEventListener('mouseleave', function() {
            svg.querySelectorAll('.arrow').forEach(function(a) { a.style.opacity = ''; });
        });
    });

    // ── ARROW TOOLTIP ────────────────────────────────────────────────────
    svg.querySelectorAll('.arrow').forEach(function(a) {
        a.style.cursor = 'crosshair';
        a.addEventListener('mouseenter', function(ev) {
            tooltip.textContent = a.getAttribute('data-label');
            tooltip.style.display = 'block';
        });
        a.addEventListener('mousemove', function(ev) {
            tooltip.style.left = (ev.clientX + 14) + 'px';
            tooltip.style.top  = (ev.clientY - 32) + 'px';
        });
        a.addEventListener('mouseleave', function() {
            tooltip.style.display = 'none';
        });
    });

    // ── WALLET (header) ──────────────────────────────────────────────────
    var wax = new waxjs.WaxJS({
        rpcEndpoint: 'https://wax.greymass.com',
        userAccount: localStorage.getItem('naron_wallet') || '',
        tryAutoLogin: false
    });

    function updateWalletUI(account) {
        var btnA   = document.getElementById('wallet-connect-btn');
        var btnAnc = document.getElementById('wallet-btn-anchor');
        var btnWCC = document.getElementById('wallet-btn-wcc');
        if (account) {
            if (btnA)   { btnA.textContent = '[ '+account+' ]'; btnA.style.display=''; btnA.classList.add('logged-in'); }
            if (btnAnc) btnAnc.style.display = 'none';
            if (btnWCC) btnWCC.style.display = 'none';
        } else {
            if (btnA)   { btnA.style.display='none'; btnA.classList.remove('logged-in'); }
            if (btnAnc) btnAnc.style.display = '';
            if (btnWCC) btnWCC.style.display = '';
        }
    }

    window.loginWithAnchor = async function() {
        try {
            var r = await window.walletKit.login();
            window.walletSession = r.session;
            localStorage.setItem('naron_wallet', String(r.session.actor));
            updateWalletUI(String(r.session.actor));
        } catch(e) {}
    };
    window.loginWithWCC = async function() {
        try {
            var account = await wax.login();
            localStorage.setItem('naron_wallet', account);
            updateWalletUI(account);
        } catch(e) {}
    };
    window.disconnectWallet = function() {
        if (window.walletKit && window.walletSession) {
            window.walletKit.logout(window.walletSession).catch(function(){});
            window.walletSession = null;
        }
        localStorage.removeItem('naron_wallet');
        if (wax) wax.userAccount = '';
        updateWalletUI(null);
    };
    window.toggleHamburger = function() {
        var dd = document.getElementById('nav-dropdown');
        if (dd) dd.classList.toggle('open');
    };

    updateWalletUI(localStorage.getItem('naron_wallet'));

})();
</script>
</body>
</html>
